<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>FF14 캐릭터 시트 생성기</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; }
body { 
  margin: 0; 
  background: #1a1a1a; 
  color: white; 
  font-family: 'Arial', sans-serif; 
  display: flex; 
  height: 100vh; 
  overflow: hidden; 
}
.panel { 
  width: 300px; 
  min-width: 300px; 
  padding: 20px; 
  background: #111; 
  border-right: 1px solid #333; 
  overflow-y: auto; 
  height: 100vh; 
}
.panel h2 { 
  font-size: 18px; 
  margin: 0 0 20px 0; 
  color: #ffd700; 
}
.section { 
  margin-bottom: 20px; 
}
.section h3 { 
  font-size: 14px; 
  margin: 0 0 10px 0; 
  color: #aaa; 
  text-transform: uppercase; 
}
input[type="text"], input[type="file"], select { 
  width: 100%; 
  padding: 8px; 
  background: #222; 
  border: 1px solid #444; 
  color: white; 
  border-radius: 4px; 
}
.job-category { 
  margin-bottom: 10px; 
}
.job-category-header { 
  cursor: pointer; 
  padding: 8px; 
  background: #333; 
  border-radius: 4px; 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  font-size: 12px; 
}
.job-category-content { 
  display: none; 
  flex-wrap: wrap; 
  gap: 5px; 
}
.job-category.open .job-category-content { display: flex; }
.job-icon { 
  width: 36px; 
  height: 36px; 
  cursor: pointer; 
  border: 2px solid transparent; 
  border-radius: 4px; 
  transition: all 0.2s; 
}
.job-icon.selected { 
  border-color: #ffd700; 
  box-shadow: 0 0 10px #ffd700; 
}
.main-container { 
  flex: 1; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  justify-content: center; 
  position: relative; 
}
.card-wrapper { 
  position: relative; 
  width: 90%; 
  height: 90%; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
}
#card { 
  width: 1080px; 
  height: 1920px; 
  background: linear-gradient(135deg, #0a0a1a, #1a1a2a); 
  border-radius: 20px; 
  box-shadow: 0 20px 60px rgba(0,0,0,0.8); 
  position: relative; 
  overflow: hidden; 
  font-family: 'serif'; 
}
#background-img, #lineart-img { 
  position: absolute; 
  top: 0; 
  left: 0; 
  width: 100%; 
  height: 100%; 
  object-fit: cover; 
  cursor: move; 
}
#lineart-img { 
  mix-blend-mode: multiply; 
  opacity: 0.8; 
}
.content { 
  position: absolute; 
  z-index: 10; 
}
.top-title { 
  top: 100px; 
  left: 100px; 
  font-size: 120px; 
  font-weight: bold; 
  text-shadow: 3px 3px 6px rgba(0,0,0,0.8); 
  letter-spacing: 5px; 
}
.nickname-server { 
  top: 250px; 
  left: 100px; 
  font-size: 60px; 
}
#nickname { font-weight: bold; color: #ffd700; }
#server { 
  font-size: 0.7em; 
  color: #aaa; 
  margin-left: 20px; 
}
.job-display { 
  top: 400px; 
  left: 100px; 
  display: flex; 
  flex-wrap: wrap; 
  gap: 10px; 
  max-width: 400px; 
}
.job-display img { 
  width: 80px; 
  height: 80px; 
  filter: drop-shadow(0 0 10px rgba(255,215,0,0.5)); 
}
.barcode { 
  position: absolute; 
  top: 50px; 
  right: 100px; 
  width: 200px; 
  height: 60px; 
  background: repeating-linear-gradient(90deg, #fff 0, #fff 2px, transparent 2px, transparent 4px); 
}
.tags { 
  position: absolute; 
  bottom: 200px; 
  right: 100px; 
  font-size: 40px; 
  color: #ffd700; 
}
.controls { 
  position: absolute; 
  bottom: 20px; 
  left: 50%; 
  transform: translateX(-50%); 
}
button { 
  padding: 10px 20px; 
  background: #ffd700; 
  color: #000; 
  border: none; 
  border-radius: 5px; 
  cursor: pointer; 
  font-weight: bold; 
  margin: 0 10px; 
}
</style>
</head>
<body>
<div class="panel">
  <h2>FF14 잡지 커버 제작기</h2>
  
  <div class="section">
    <h3>기본 정보</h3>
    <input type="text" id="nickname" placeholder="닉네임" value="플레이어">
    <input type="text" id="server" placeholder="서버" value="가디언의 모루">
    <input type="text" id="title" placeholder="대제목" value="ULTIMATE CRAFTER">
  </div>
  
  <div class="section">
    <h3>직업 선택</h3>
    <div id="job-select"></div>
  </div>
  
  <div class="section">
    <h3>라인아트</h3>
    <input type="file" id="lineart-upload" accept="image/*">
    <div id="lineart-select"></div>
  </div>
  
  <div class="section">
    <h3>배경 이미지</h3>
    <input type="file" id="bg-upload" accept="image/*">
  </div>
  
  <input type="checkbox" id="rtbl"> RT BL 태그 표시
</div>

<div class="main-container">
  <div class="card-wrapper" id="wrapper">
    <div id="card">
      <img id="background-img" src="">
      <img id="lineart-img" src="">
      <div class="content top-title" id="title-display"></div>
      <div class="content nickname-server">
        <span id="nickname-display"></span>
        <span id="server-display"></span>
      </div>
      <div class="content job-display" id="job-display"></div>
      <div class="barcode" id="barcode"></div>
      <div class="content tags" id="tags">RT BL</div>
    </div>
  </div>
  <div class="controls">
    <button onclick="updateCard()">업데이트</button>
    <button onclick="saveImage()">이미지 저장</button>
  </div>
</div>

<script>
const jobCategories = {
  "전투": {
    "탱커": ["pld","war","drk","gnb"],
    "힐러": ["whm","sch","ast","sge"],
    "근딜": ["mnk","drg","nin","sam","rpr","vpr"],
    "원딜": ["brd","mch","dnc"],
    "마딜": ["blm","smn","rdm","pct","blu"]
  },
  "제작": ["crp","bsm","arm","gsm","ltw","wvr","alc","cul"],
  "채집": ["min","btn","fsh"]
};

const iconBase = "https://raw.githubusercontent.com/xivapi/classjob-icons/master/icons/";

let selectedJobs = [];

function renderJobSelect() {
  const container = document.getElementById("job-select");
  container.innerHTML = "";
  Object.entries(jobCategories).forEach(([cat, subs]) => {
    const catDiv = document.createElement("div");
    catDiv.className = "job-category";
    if (typeof subs === "object") {
      catDiv.innerHTML = `
        <div class="job-category-header" onclick="toggleJobCategory(this)">
          <span>${cat}</span>
          <span class="toggle-arrow">▼</span>
        </div>
        <div class="job-category-content"></div>
      `;
      const content = catDiv.querySelector(".job-category-content");
      Object.entries(subs).forEach(([sub, jobs]) => {
        const subDiv = document.createElement("div");
        subDiv.className = "job-category";
        subDiv.innerHTML = `
          <div class="job-category-header" onclick="toggleJobCategory(this)">
            <span>${sub}</span>
            <span class="toggle-arrow">▼</span>
          </div>
          <div class="job-category-content"></div>
        `;
        const subContent = subDiv.querySelector(".job-category-content");
        jobs.forEach(job => {
          const img = document.createElement("img");
          img.src = `${iconBase}${job.toUpperCase()}.png`;
          img.className = "job-icon";
          img.title = job.toUpperCase();
          img.onclick = () => selectJob(job);
          subContent.appendChild(img);
        });
        content.appendChild(subDiv);
    } else {
      subs.forEach(job => {
        const img = document.createElement("img");
        img.src = `${iconBase}${job.toUpperCase()}.png`;
        img.className = "job-icon";
        img.title = job.toUpperCase();
        img.onclick = () => selectJob(job);
        content.appendChild(img);
      });
    }
    container.appendChild(catDiv);
  });
}

function toggleJobCategory(header) {
  const cat = header.parentElement;
  cat.classList.toggle("open");
}

function selectJob(job) {
  const idx = selectedJobs.indexOf(job);
  if (idx > -1) {
    selectedJobs.splice(idx, 1);
  } else {
    selectedJobs.push(job);
    if (selectedJobs.length > 6) selectedJobs.shift();
  }
  document.querySelectorAll(".job-icon").forEach(icon => {
    icon.classList.toggle("selected", selectedJobs.includes(icon.title.toLowerCase()));
  });
  updateCard();
}

function renderLineArtSelect() {
  const container = document.getElementById("lineart-select");
  container.innerHTML = '<p>업로드하거나 기본 라인아트 사용</p>';
}

document.getElementById("lineart-upload").onchange = function(e) {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = ev => document.getElementById("lineart-img").src = ev.target.result;
    reader.readAsDataURL(file);
  }
};

document.getElementById("bg-upload").onchange = function(e) {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = ev => document.getElementById("background-img").src = ev.target.result;
    reader.readAsDataURL(file);
  }
};

function drawBarcode() {
  const canvas = document.createElement("canvas");
  canvas.width = 200;
  canvas.height = 60;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#fff";
  for (let i = 0; i < 50; i++) {
    const w = 2 + Math.random() * 3;
    const h = 20 + Math.random() * 30;
    ctx.fillRect(i * 4, 60 - h, w, h);
  }
  document.getElementById("barcode").innerHTML = "";
  document.getElementById("barcode").appendChild(canvas);
}

function updateCard() {
  document.getElementById("title-display").textContent = document.getElementById("title").value;
  document.getElementById("nickname-display").textContent = document.getElementById("nickname").value;
  document.getElementById("server-display").textContent = document.getElementById("server").value;
  
  const jobDisplay = document.getElementById("job-display");
  jobDisplay.innerHTML = "";
  selectedJobs.slice(0, 6).forEach(job => {
    const img = document.createElement("img");
    img.src = `${iconBase}${job.toUpperCase()}.png`;
    jobDisplay.appendChild(img);
  });
  
  const rtbl = document.getElementById("rtbl");
  document.getElementById("tags").style.display = rtbl.checked ? "block" : "none";
}

function fitPreview() {
  const container = document.getElementById("wrapper");
  const card = document.getElementById("card");
  const scale = Math.min(
    (container.clientWidth - 40) / card.offsetWidth,
    (container.clientHeight - 40) / card.offsetHeight
  );
  container.style.transform = `scale(${scale}) translate(-50%, -50%)`;
}

function saveImage() {
  html2canvas(document.getElementById("card"), { scale: 3 }).then(canvas => {
    const link = document.createElement("a");
    link.download = "ff14_magazine_cover.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

// 드래그 기능 (이미지 이동)
let isDragging = false;
let dragTarget = null;
['background-img', 'lineart-img'].forEach(id => {
  const img = document.getElementById(id);
  img.onmousedown = () => { isDragging = true; dragTarget = img; };
});
document.onmousemove = (e) => {
  if (isDragging && dragTarget) {
    const rect = dragTarget.parentElement.getBoundingClientRect();
    dragTarget.style.objectPosition = `${e.clientX - rect.left}px ${e.clientY - rect.top}px`;
  }
};
document.onmouseup = () => { isDragging = false; };

// 초기화
window.addEventListener("DOMContentLoaded", () => {
  renderJobSelect();
  drawBarcode();
  updateCard();
  fitPreview();
});
window.addEventListener("resize", fitPreview);
</script>
</body>
</html>
