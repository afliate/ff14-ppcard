<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>FF14 캐릭터 시트 제작기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #111;
  color: white;
  font-family: 'Noto Serif KR', serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ==========================================
   왼쪽 패널
========================================== */
.panel {
  width: 260px;
  min-width: 260px;
  padding: 14px;
  background: #0e0e0e;
  border-right: 1px solid #1e1e1e;
  overflow-y: auto;
  height: 100vh;
  font-family: sans-serif;
}

.panel h2 {
  font-size: 12px;
  margin-bottom: 14px;
  opacity: 0.7;
  letter-spacing: 0.05em;
}

.section {
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid #1e1e1e;
}

.section h3 {
  font-size: 10px;
  opacity: 0.4;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-bottom: 7px;
}

.field label { font-size: 10px; opacity: 0.5; }

.field input[type="text"] {
  width: 100%;
  padding: 5px 7px;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  color: white;
  font-size: 12px;
}

input[type="file"] { font-size: 11px; color: #888; width: 100%; }

.layout-buttons { display: flex; gap: 6px; }
.layout-btn {
  flex: 1; padding: 6px;
  background: #1a1a1a; color: white;
  border: 1px solid #333; cursor: pointer; font-size: 11px;
}
.layout-btn.active { background: white; color: black; }

/* 직업 선택 */
.job-section-header {
  display: flex; align-items: center;
  justify-content: space-between;
  cursor: pointer; padding: 4px 0; user-select: none;
}
.job-section-header span { font-size: 10px; opacity: 0.4; text-transform: uppercase; letter-spacing: 0.08em; }
.job-section-body.collapsed { display: none; }

.job-category { margin-bottom: 8px; }
.job-title { font-size: 10px; opacity: 0.4; margin-bottom: 5px; }
.job-subrow { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
.job-subtitle { width: 34px; font-size: 9px; opacity: 0.4; flex-shrink: 0; }
.job-row { display: flex; flex-wrap: wrap; gap: 3px; }

.job-icon {
  width: 24px; height: 24px;
  cursor: pointer; filter: invert(1);
  opacity: 0.35; transition: opacity 0.1s;
}
.job-icon:hover { opacity: 0.75; }
.job-icon.selected { opacity: 1; outline: 1px solid white; outline-offset: 1px; }
.job-icon.main-selected { opacity: 1; outline: 2px solid #f5c518; outline-offset: 1px; }

.section button {
  padding: 6px; background: #1a1a1a;
  border: 1px solid #333; color: white;
  cursor: pointer; font-size: 11px; flex: 1;
}
.section button:hover { background: #252525; }

.time-btn {
  padding: 5px 10px; background: #1a1a1a;
  border: 1px solid #333; color: white;
  cursor: pointer; font-size: 11px;
}
.time-btn.active { background: white; color: black; }

.save-btn {
  width: 100%; padding: 8px;
  background: #1a1a1a; border: 1px solid #444;
  color: white; cursor: pointer; font-size: 12px;
}
.save-btn:hover { background: #252525; }

/* ==========================================
   오른쪽 미리보기
========================================== */
.preview-container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overflow: hidden;
  padding: 20px;
  background: #0a0a0a;
}

.preview-wrapper { transform-origin: top center; }

/* ==========================================
   카드 본체
========================================== */
.card {
  position: relative;
  overflow: hidden;
  background: #0a0510;
}

.card.vertical  { width: 1080px; height: 1920px; }
.card.horizontal { width: 1920px; height: 1080px; }

/* 배경 이미지 — 밝기 보정 없음 */
.card .bg {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  z-index: 0;
}

/* 하단 그라데이션 */
.card::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.1) 0%,
    transparent 30%,
    transparent 50%,
    rgba(0,0,0,0.65) 75%,
    rgba(0,0,0,0.9) 100%
  );
  z-index: 1;
  pointer-events: none;
}

/* ── 잡지 제목 ── */
#mainTitle {
  position: absolute;
  top: 48px;
  left: 56px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 200px;
  line-height: 0.88;
  letter-spacing: 4px;
  color: white;
  z-index: 10;
  pointer-events: none;
}

/* ── 바코드 ── */
.barcode-area {
  position: absolute;
  top: 52px;
  right: 52px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}

.barcode-svg { width: 110px; height: 44px; }

.barcode-label {
  font-size: 18px;
  opacity: 0.45;
  letter-spacing: 0.06em;
  font-family: sans-serif;
}

/* ── 왼쪽 세로 잡 아이콘 ── */
#jobDisplay {
  position: absolute;
  left: 40px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 10;
}

.job-card-icon {
  width: 56px; height: 56px;
  filter: invert(1);
  display: block;
  opacity: 0.85;
}

.job-card-icon.is-main {
  opacity: 1;
  filter: invert(1) drop-shadow(0 0 6px rgba(245,197,24,0.8));
}

/* ── 오른쪽 — 이달의 모델 + 서버 ── */
.right-info {
  position: absolute;
  top: 300px;
  right: 56px;
  text-align: right;
  z-index: 10;
}

.right-label {
  font-size: 26px;
  opacity: 0.65;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
  font-family: sans-serif;
}

#serverInfo {
  font-size: 22px;
  opacity: 0.5;
  letter-spacing: 0.05em;
  font-family: sans-serif;
  margin-top: 6px;
}

/* ── 하단 왼쪽 — 칭호 + 이름 ── */
.bottom-left {
  position: absolute;
  bottom: 220px;
  left: 120px;
  z-index: 10;
}

.feature-box {
  display: inline-block;
  background: rgba(200,20,20,0.92);
  padding: 6px 16px;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
  font-family: sans-serif;
}

#cardName {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 130px;
  line-height: 0.9;
  letter-spacing: 2px;
  color: white;
}

/* ── 태그 ── */
#cardTags {
  position: absolute;
  bottom: 148px;
  left: 120px;
  z-index: 10;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tag {
  border: 1px solid rgba(255,255,255,0.6);
  padding: 4px 14px;
  font-size: 18px;
  letter-spacing: 0.05em;
  font-family: sans-serif;
}

/* ── 활동 시간 ── */
#activeTimeDisplay {
  position: absolute;
  bottom: 88px;
  left: 120px;
  display: flex;
  gap: 8px;
  z-index: 10;
}

.time-slot {
  padding: 4px 14px;
  border: 1px solid rgba(255,255,255,0.25);
  font-size: 17px;
  opacity: 0.4;
  letter-spacing: 0.04em;
  font-family: sans-serif;
}

.time-slot.active {
  border-color: white;
  opacity: 1;
  background: rgba(255,255,255,0.08);
}

/* ── 메모 ── */
#cardMemo {
  position: absolute;
  bottom: 44px;
  left: 120px;
  font-size: 18px;
  opacity: 0.45;
  letter-spacing: 0.04em;
  font-family: sans-serif;
  z-index: 10;
}

/* ── 라인아트 (오른쪽 하단, 틸트) ── */
#lineArt {
  position: absolute;
  bottom: -40px;
  right: -20px;
  width: 420px;
  height: 420px;
  object-fit: contain;
  opacity: 0.12;
  filter: invert(1);
  transform: rotate(-15deg);
  z-index: 5;
  pointer-events: none;
}

/* ── 저작권 ── */
.copyright {
  position: absolute;
  bottom: 40px;
  right: 52px;
  font-size: 16px;
  opacity: 0.3;
  line-height: 1.9;
  letter-spacing: 0.03em;
  font-family: sans-serif;
  text-align: right;
  z-index: 10;
}
</style>
</head>

<body>

<!-- 왼쪽 패널 -->
<div class="panel">
  <h2>FF14 캐릭터 시트 제작기</h2>

  <div class="section">
    <h3>레이아웃</h3>
    <div class="layout-buttons">
      <button class="layout-btn active" onclick="setLayout('vertical', this)">세로형</button>
      <button class="layout-btn" onclick="setLayout('horizontal', this)">가로형</button>
    </div>
  </div>

  <div class="section">
    <h3>기본 정보</h3>
    <div class="field">
      <label>잡지 이름</label>
      <input type="text" id="titleInput" oninput="updateCard()" placeholder="EORZEAN">
    </div>
    <div class="field">
      <label>칭호</label>
      <input type="text" id="titleBoxInput" oninput="updateCard()" placeholder="모험가">
    </div>
    <div class="field">
      <label>캐릭터 이름</label>
      <input type="text" id="nameInput" oninput="updateCard()" placeholder="이름">
    </div>
    <div class="field">
      <label>서버</label>
      <input type="text" id="serverInput" oninput="updateCard()" placeholder="Carbuncle">
    </div>
    <div class="field">
      <label>데이터센터</label>
      <input type="text" id="dcInput" oninput="updateCard()" placeholder="Elemental">
    </div>
  </div>

  <div class="section">
    <h3>배경 이미지</h3>
    <input type="file" accept="image/*" onchange="loadBgImage(event)">
  </div>

  <div class="section">
    <h3>라인아트 선택</h3>
    <div id="lineArtSelect" style="display:flex; flex-wrap:wrap; gap:4px; margin-top:4px;"></div>
  </div>

  <div class="section">
    <div class="job-section-header" onclick="toggleJobSection()">
      <span>직업 선택</span>
      <span id="jobArrow" style="font-size:10px; opacity:0.4;">▼</span>
    </div>
    <div class="job-section-body" id="jobSectionBody">
      <div style="display:flex; gap:6px; margin:6px 0;">
        <button onclick="selectAllJobs()">전체 선택</button>
        <button onclick="clearJobs()">전체 해제</button>
      </div>
      <div style="font-size:9px; opacity:0.35; margin-bottom:6px;">※ 노란 테두리 = 메인잡 (선택 후 다시 클릭)</div>
      <div id="jobSelect"></div>
    </div>
  </div>

  <div class="section">
    <h3>태그</h3>
    <div class="field">
      <label>쉼표로 구분</label>
      <input type="text" id="tagInput" oninput="updateCard()" placeholder="RT, BL, HL">
    </div>
  </div>

  <div class="section">
    <h3>활동 시간</h3>
    <div style="display:flex; gap:5px; flex-wrap:wrap;">
      <button class="time-btn" data-time="아침" onclick="toggleTime(this)">아침</button>
      <button class="time-btn" data-time="점심" onclick="toggleTime(this)">점심</button>
      <button class="time-btn" data-time="저녁" onclick="toggleTime(this)">저녁</button>
      <button class="time-btn" data-time="심야" onclick="toggleTime(this)">심야</button>
    </div>
  </div>

  <div class="section">
    <h3>메모 / 코멘트</h3>
    <div class="field">
      <input type="text" id="memoInput" oninput="updateCard()" placeholder="한 줄 코멘트">
    </div>
  </div>

  <div class="section">
    <button class="save-btn" onclick="saveImage()">이미지 저장</button>
  </div>
</div>


<!-- 오른쪽 미리보기 -->
<div class="preview-container">
  <div class="preview-wrapper" id="previewWrapper">
    <div class="card vertical" id="card">

      <img class="bg" id="bgImage" src="">

      <div id="mainTitle">EORZEAN</div>

      <div class="barcode-area">
        <svg class="barcode-svg" id="barcodeSvg" viewBox="0 0 110 44"></svg>
        <div class="barcode-label" id="barcodeLabel">FF14-PROFILE</div>
      </div>

      <div id="jobDisplay"></div>

      <div class="right-info">
        <div class="right-label">이달의 모델</div>
        <div id="serverInfo">Carbuncle · Elemental</div>
      </div>

      <div class="bottom-left">
        <div class="feature-box" id="featureBox">모험가</div>
        <div id="cardName">캐릭터</div>
      </div>

      <div id="cardTags"></div>
      <div id="activeTimeDisplay"></div>
      <div id="cardMemo"></div>

      <img id="lineArt" src="" style="display:none;">

      <div class="copyright">
        ⓒ SQUARE ENIX<br>
        Published in Korea by ACTOZ SOFT CO., LTD<br>
        FINAL FANTASY XIV
      </div>

    </div>
  </div>
</div>


<script>
const jobCategories = {
  "전투": {
    "탱커": ["pld","war","drk","gnb"],
    "힐러": ["whm","sch","ast","sge"],
    "근딜": ["mnk","drg","nin","sam","rpr","vpr"],
    "원딜": ["brd","mch","dnc"],
    "마딜": ["blm","smn","rdm","pct","blu"]
  },
  "제작": ["crp","bsm","arm","gsm","ltw","wvr","alc","cul"],
  "채집": ["min","btn","fsh"]
};

let selectedJobs = [];
let mainJob = null;
let activeTimes = [];

function updateCard() {
  document.getElementById("mainTitle").innerText =
    document.getElementById("titleInput").value || "EORZEAN";

  document.getElementById("featureBox").innerText =
    document.getElementById("titleBoxInput").value || "모험가";

  document.getElementById("cardName").innerText =
    document.getElementById("nameInput").value || "캐릭터";

  const server = document.getElementById("serverInput").value;
  const dc = document.getElementById("dcInput").value;
  document.getElementById("serverInfo").innerText =
    server ? (dc ? `${server} · ${dc}` : server) : "Carbuncle · Elemental";

  const nameVal = document.getElementById("nameInput").value || "FF14";
  document.getElementById("barcodeLabel").innerText =
    nameVal.toUpperCase().slice(0, 14);

  // 잡 아이콘 (왼쪽 세로)
  const allJobs = getAllJobsInOrder();
  document.getElementById("jobDisplay").innerHTML = allJobs
    .filter(job => selectedJobs.includes(job))
    .map(job => `<img class="job-card-icon ${job === mainJob ? 'is-main' : ''}"
                      src="images/jobs/ffxivjobssvg_meteor/${job}.svg">`)
    .join("");

  // 태그
  document.getElementById("cardTags").innerHTML =
    document.getElementById("tagInput").value
      .split(",").map(t => t.trim()).filter(t => t)
      .map(t => `<span class="tag">${t}</span>`).join("");

  // 활동 시간
  document.getElementById("activeTimeDisplay").innerHTML =
    ["아침","점심","저녁","심야"]
      .map(t => `<div class="time-slot ${activeTimes.includes(t) ? 'active' : ''}">${t}</div>`)
      .join("");

  // 메모
  document.getElementById("cardMemo").innerText =
    document.getElementById("memoInput").value || "";
}

function drawBarcode() {
  const svg = document.getElementById("barcodeSvg");
  const bars = 38, w = 110, h = 44;
  let html = "";
  for (let i = 0; i < bars; i++) {
    const x = (i / bars) * w;
    const bw = Math.random() < 0.35 ? 2.2 : 1.1;
    const bh = Math.random() < 0.18 ? h * 0.65 : h * 0.88;
    html += `<rect x="${x.toFixed(1)}" y="${(h-bh).toFixed(1)}" width="${bw}" height="${bh.toFixed(1)}" fill="white" opacity="0.65"/>`;
  }
  svg.innerHTML = html;
}

function renderJobSelect() {
  let html = "";
  for (const category in jobCategories) {
    const data = jobCategories[category];
    html += `<div class="job-category"><div class="job-title">${category}</div>`;
    if (typeof data === "object" && !Array.isArray(data)) {
      for (const sub in data) {
        html += `<div class="job-subrow"><div class="job-subtitle">${sub}</div><div class="job-row">`;
        data[sub].forEach(job => {
          html += `<img src="images/jobs/ffxivjobssvg/${job}.svg" class="job-icon" id="icon-${job}" onclick="toggleJob('${job}')" title="${job}">`;
        });
        html += `</div></div>`;
      }
    } else {
      html += `<div class="job-row">`;
      data.forEach(job => {
        html += `<img src="images/jobs/ffxivjobssvg/${job}.svg" class="job-icon" id="icon-${job}" onclick="toggleJob('${job}')" title="${job}">`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }
  document.getElementById("jobSelect").innerHTML = html;
}

function toggleJob(job) {
  if (!selectedJobs.includes(job)) {
    selectedJobs.push(job);
  } else if (mainJob !== job) {
    mainJob = job;
  } else {
    selectedJobs = selectedJobs.filter(j => j !== job);
    mainJob = null;
  }
  updateSelectionUI();
  updateCard();
}

function updateSelectionUI() {
  document.querySelectorAll(".job-icon").forEach(el => {
    const job = el.id.replace("icon-", "");
    el.classList.remove("selected", "main-selected");
    if (job === mainJob) el.classList.add("main-selected");
    else if (selectedJobs.includes(job)) el.classList.add("selected");
  });
}

function selectAllJobs() {
  selectedJobs = getAllJobsInOrder();
  updateSelectionUI(); updateCard();
}

function clearJobs() {
  selectedJobs = []; mainJob = null;
  updateSelectionUI(); updateCard();
}

function getAllJobsInOrder() {
  const all = [];
  Object.values(jobCategories).forEach(cat => {
    if (Array.isArray(cat)) all.push(...cat);
    else Object.values(cat).forEach(sub => all.push(...sub));
  });
  return all;
}

function toggleJobSection() {
  const body = document.getElementById("jobSectionBody");
  const arrow = document.getElementById("jobArrow");
  body.classList.toggle("collapsed");
  arrow.innerText = body.classList.contains("collapsed") ? "▶" : "▼";
}

function renderLineArtSelect() {
  const jobs = getAllJobsInOrder();
  document.getElementById("lineArtSelect").innerHTML =
    jobs.map(job =>
      `<img src="images/jobs/ffxivjobssvg/${job}.svg"
            style="width:22px;height:22px;cursor:pointer;filter:invert(1);opacity:0.4;"
            onclick="setLineArt('${job}')" title="${job}">`
    ).join("");
}

function setLineArt(job) {
  const la = document.getElementById("lineArt");
  la.src = `images/jobs/CL/${job.toUpperCase()}.png`;
  la.style.display = "block";
}

function toggleTime(btn) {
  const t = btn.dataset.time;
  if (activeTimes.includes(t)) {
    activeTimes = activeTimes.filter(x => x !== t);
    btn.classList.remove("active");
  } else {
    activeTimes.push(t);
    btn.classList.add("active");
  }
  updateCard();
}

let bgPosX = 50, bgPosY = 50;
let isDragging = false, dragStartX, dragStartY;

function loadBgImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const bg = document.getElementById("bgImage");
    bg.src = e.target.result;
    bg.style.cursor = "grab";
    bg.removeEventListener("mousedown", startDrag);
    bg.addEventListener("mousedown", startDrag);
  };
  reader.readAsDataURL(file);
}

function startDrag(e) {
  isDragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  document.getElementById("bgImage").style.cursor = "grabbing";
  document.addEventListener("mousemove", onDrag);
  document.addEventListener("mouseup", stopDrag);
}

function onDrag(e) {
  if (!isDragging) return;
  const card = document.getElementById("card");
  bgPosX = Math.min(100, Math.max(0, bgPosX - (e.clientX - dragStartX) / card.offsetWidth * 100));
  bgPosY = Math.min(100, Math.max(0, bgPosY - (e.clientY - dragStartY) / card.offsetHeight * 100));
  document.getElementById("bgImage").style.objectPosition = `${bgPosX}% ${bgPosY}%`;
  dragStartX = e.clientX; dragStartY = e.clientY;
}

function stopDrag() {
  isDragging = false;
  document.getElementById("bgImage").style.cursor = "grab";
  document.removeEventListener("mousemove", onDrag);
  document.removeEventListener("mouseup", stopDrag);
}

function setLayout(mode, btn) {
  const card = document.getElementById("card");
  card.classList.remove("vertical", "horizontal");
  card.classList.add(mode);
  document.querySelectorAll(".layout-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  fitPreview();
}

function fitPreview() {
  const card = document.getElementById("card");
  const container = document.querySelector(".preview-container");
  const wrapper = document.getElementById("previewWrapper");
  const cw = container.clientWidth - 40;
  const ch = container.clientHeight - 40;
  const cardW = card.classList.contains("vertical") ? 1080 : 1920;
  const cardH = card.classList.contains("vertical") ? 1920 : 1080;
  const scale = Math.min(cw / cardW, ch / cardH);
  wrapper.style.transform = `scale(${scale})`;
  wrapper.style.width  = cardW + "px";
  wrapper.style.height = cardH + "px";
}

function saveImage() {
  html2canvas(document.getElementById("card"), { scale: 2 }).then(canvas => {
    const link = document.createElement("a");
    link.download = "character_sheet.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

renderJobSelect();
renderLineArtSelect();
drawBarcode();
updateCard();
fitPreview();
window.addEventListener("resize", fitPreview);
</script>
</body>
</html>
