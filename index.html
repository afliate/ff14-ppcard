<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>캐릭터 시트 제작기</title>

<!-- ⭐ 여기 넣기 -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: sans-serif;
    display: flex;
  }

  .panel {
    width: 30%;
    padding: 20px;
    background: #111;
  }

  .card {
    position: relative;
    width: 70%;
    height: 100vh;
    overflow: hidden;
  }

  .bg {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.5);
  }

  .content {
    position: absolute;
    bottom: 50px;
    left: 50px;
  }

  h1 {
    font-size: 60px;
    margin: 0;
  }

  .dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 1px solid white;
    border-radius: 50%;
    margin-right: 5px;
  }

  .filled {
    background: white;
  }

  .tag {
    display: inline-block;
    border: 1px solid white;
    padding: 5px 10px;
    margin-right: 5px;
    margin-top: 5px;
  }

  input {
    width: 100%;
    margin-bottom: 10px;
    padding: 5px;
  }

  /* ⭐⭐⭐ 여기부터 추가 ⭐⭐⭐ */
  .job-select {
  width: 35px;
  margin: 3px;
  cursor: pointer;
  filter: invert(1);
  transition: 0.2s; /* ⭐ 추가 */
}

  .job-select:hover {
  transform: scale(1.1);
}

  #job {
  position: absolute;
  left: 20px;
  bottom: 50px;

  display: flex;
  flex-direction: column; /* ⭐ 세로 */
  gap: 5px;
}
#mainTitle {
  position: absolute;
  top: 20px;
  left: 50px;
  font-size: 80px;
  font-weight: bold;
}
.content {
  display: flex;
  gap: 20px;
}

.info {
  margin-left: 20px;
}
.info {
  background: rgba(0, 0, 0, 0.5);
  padding: 15px;
  border-radius: 10px;
  backdrop-filter: blur(5px); /* ⭐ 유리 느낌 */
}

  .content {
  position: absolute;
  bottom: 50px;
  left: 100px; /* 아이콘 자리 고려해서 밀기 */
}

  .feature-box {
  background: rgba(255, 0, 0, 0.7);
  padding: 5px 10px;
}
</style>
</head>

<body>

// <!-- 입력 패널 -->
<div class="panel">
  <h2>파이널 판타지 14 캐릭터 시트 제작기</h2>
  
  이름:
  <input id="nameInput" oninput="updateCard()" placeholder="캐릭터 이름">

  전투력:
  <input id="powerInput" type="range" min="0" max="5" oninput="updateCard()">

  태그 (쉼표로 구분):
  <input id="tagInput" oninput="updateCard()" placeholder="RT, BL, HL">

  이미지 업로드:
<input type="file" id="imgInput" accept="image/*" onchange="loadImage(event)">

  <h3>직업 선택</h3>
<div id="jobSelect"></div>

<button onclick="selectAllJobs()">전체 선택</button>
<button onclick="clearJobs()">전체 해제</button>

  <button onclick="saveImage()">이미지 저장</button>
  
</div>

// <!-- 카드 -->
  
<div class="card">
  <img class="bg" id="bgImage" src="">
  
 <h1 id="mainTitle">LALAFELL</h1>
  
<div class="content">
  <div id="job"></div>

<div class="info">
  <div class="feature-box">모험가</div>

  <h1 id="name">캐릭터</h1>
  <div id="stats"></div>
  <div id="tags"></div>
  </div>
</div>

<script>

// ⭐ 1. 직업 데이터 (맨 위)
const jobCategories = {
  "전투": [
    "pld","war","drk","gnb",
    "whm","sch","ast","sge",
    "mnk","drg","nin","sam","rpr","vpr",
    "brd","mch","dnc",
    "blm","smn","rdm","blu","pct"
  ],
  "제작": [
    "crp","bsm","arm","gsm","ltw","wvr","alc","cul"
  ],
  "채집": [
    "min","btn","fsh"
  ]
};

// ⭐ 2. 선택된 직업 저장
let selectedJobs = [];

// ⭐ 3. 카드 업데이트
function updateCard() {

  // 이름
  document.getElementById("name").innerText =
    document.getElementById("nameInput").value || "캐릭터";

  // 전투력
  let power = Number(document.getElementById("powerInput").value) || 0;
  let dots = "";

  for (let i = 0; i < 5; i++) {
    dots += `<span class="dot ${i < power ? "filled" : ""}"></span>`;
  }

  document.getElementById("stats").innerHTML = "전투: " + dots;

  // 태그
  let tags = document.getElementById("tagInput").value.split(",");
  let tagHTML = "";

  tags.forEach(tag => {
    if (tag.trim() !== "") {
      tagHTML += `<span class="tag">${tag.trim()}</span>`;
    }
  });

  document.getElementById("tags").innerHTML = tagHTML;

  // ⭐ 직업 표시 (선택된 것만)
  let jobHTML = [];

// 순서대로 넣기
Object.values(jobCategories).forEach(category => {
  category.forEach(job => {
    if (selectedJobs.includes(job)) {
      let path = "images/jobs/ffxivjobssvg/" + job + ".svg";
      jobHTML.push(`<img src="${path}" style="width:30px; filter: invert(1);">`);
    }
  });
});

document.getElementById("job").innerHTML = jobHTML.join("");
}

// ⭐ 4. 클릭하면 선택/해제
function toggleJob(job) {
  if (selectedJobs.includes(job)) {
    selectedJobs = selectedJobs.filter(j => j !== job);
  } else {
    selectedJobs.push(job);
  }

  updateCard();
  updateSelectionUI();
}

// ⭐ 5. 선택 UI 생성
function renderJobSelect() {
  let html = "";

  for (let category in jobCategories) {
    html += `<h4>${category}</h4>`;

    jobCategories[category].forEach(job => {
      let path = "images/jobs/ffxivjobssvg/" + job + ".svg";

      html += `
        <img src="${path}"
             onclick="toggleJob('${job}')"
             class="job-select"
             id="select-${job}">
      `;
    });
  }

  document.getElementById("jobSelect").innerHTML = html;
}

// ⭐ 6. 선택된 아이콘 표시
function updateSelectionUI() {
  document.querySelectorAll(".job-select").forEach(el => {
    let job = el.id.replace("select-", "");

    if (selectedJobs.includes(job)) {
      el.style.border = "2px solid white";
    } else {
      el.style.border = "none";
    }
  });
}

// ⭐ 7. 전체 선택
function selectAllJobs() {
  selectedJobs = Object.values(jobCategories).flat();
  updateCard();
  updateSelectionUI();
}

// ⭐ 8. 전체 해제
function clearJobs() {
  selectedJobs = [];
  updateCard();
  updateSelectionUI();
}

// ⭐ 9. 이미지 업로드
function loadImage(event) {
  let file = event.target.files[0];

  if (file) {
    let reader = new FileReader();

    reader.onload = function(e) {
      document.getElementById("bgImage").src = e.target.result;
    };

    reader.readAsDataURL(file);
  }
}

  // 이미지 저장
function saveImage() {
  html2canvas(document.querySelector(".card")).then(canvas => {
    let link = document.createElement("a");
    link.download = "character.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
  
// ⭐ 10. 페이지 로드시 실행
renderJobSelect();

</script>

</body>
</html>
