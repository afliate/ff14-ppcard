<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>캐릭터 시트 제작기</title>

<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: sans-serif;
    display: flex;
  }

  .panel {
    width: 30%;
    padding: 20px;
    background: #111;
  }

  .card {
    position: relative;
    width: 70%;
    height: 100vh;
    overflow: hidden;
  }

  .bg {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.5);
  }

  .content {
    position: absolute;
    bottom: 50px;
    left: 50px;
  }

  h1 {
    font-size: 60px;
    margin: 0;
  }

  .dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 1px solid white;
    border-radius: 50%;
    margin-right: 5px;
  }

  .filled {
    background: white;
  }

  .tag {
    display: inline-block;
    border: 1px solid white;
    padding: 5px 10px;
    margin-right: 5px;
    margin-top: 5px;
  }

  input {
    width: 100%;
    margin-bottom: 10px;
    padding: 5px;
  }
</style>
</head>

<body>

<!-- 입력 패널 -->
<div class="panel">
  <h2>파이널 판타지 14 캐릭터 시트 제작기</h2>

  이름:
  <input id="nameInput" oninput="updateCard()" placeholder="캐릭터 이름">

  전투력:
  <input id="powerInput" type="range" min="0" max="5" oninput="updateCard()">

  태그 (쉼표로 구분):
  <input id="tagInput" oninput="updateCard()" placeholder="RT, BL, HL">

  이미지 URL:
  <input id="imgInput" oninput="updateCard()" placeholder="이미지 링크">
</div>

<!-- 카드 -->
<div class="card">
  <img class="bg" id="bgImage" src="">

  <div class="content">
    <h1 id="name">캐릭터</h1>
    <div id="stats"></div>
    <div id="tags"></div>
  </div>
</div>

<script>
function updateCard() { //  전체 업데이트 담당

  // 이름
  document.getElementById("name").innerText =
    document.getElementById("nameInput").value || "캐릭터";

  // 전투력
  let power = Number(document.getElementById("powerInput").value) || 0;
  let dots = "";

  for (let i = 0; i < 5; i++) {
    if (i < power) {
      dots += '<span class="dot filled"></span>';
    } else {
      dots += '<span class="dot"></span>';
    }
  }

  document.getElementById("stats").innerHTML = "전투: " + dots;

  // 태그 여러 개
  let tags = document.getElementById("tagInput").value.split(",");
  let tagHTML = "";

  tags.forEach(tag => {
    if (tag.trim() !== "") {
      tagHTML += '<span class="tag">' + tag.trim() + '</span>';
    }
  });

  document.getElementById("tags").innerHTML = tagHTML;

  // 이미지
  let img = document.getElementById("imgInput").value;
  if (img) {
    document.getElementById("bgImage").src = img;
  }
}
</script>

</body>
</html>
