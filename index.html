<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>캐릭터 시트 제작기</title>

<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: sans-serif;
    display: flex;
  }

  .panel {
    width: 30%;
    padding: 20px;
    background: #111;
  }

  .card {
    position: relative;
    width: 70%;
    height: 100vh;
    overflow: hidden;
  }

  .bg {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.5);
  }

  .content {
    position: absolute;
    bottom: 50px;
    left: 50px;
  }

  h1 {
    font-size: 60px;
    margin: 0;
  }

  .dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 1px solid white;
    border-radius: 50%;
    margin-right: 5px;
  }

  .filled {
    background: white;
  }

  .tag {
    display: inline-block;
    border: 1px solid white;
    padding: 5px 10px;
    margin-right: 5px;
    margin-top: 5px;
  }

  input {
    width: 100%;
    margin-bottom: 10px;
    padding: 5px;
  }

  /* ⭐⭐⭐ 여기부터 추가 ⭐⭐⭐ */
  .job-select {
  width: 35px;
  margin: 3px;
  cursor: pointer;
  filter: invert(1);
  transition: 0.2s; /* ⭐ 추가 */
}

  .job-select:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<!-- 입력 패널 -->
<div class="panel">
  <h2>파이널 판타지 14 캐릭터 시트 제작기</h2>

  이름:
  <input id="nameInput" oninput="updateCard()" placeholder="캐릭터 이름">

  전투력:
  <input id="powerInput" type="range" min="0" max="5" oninput="updateCard()">

  태그 (쉼표로 구분):
  <input id="tagInput" oninput="updateCard()" placeholder="RT, BL, HL">

  이미지 업로드:
<input type="file" id="imgInput" accept="image/*" onchange="loadImage(event)">

  <h3>직업 선택</h3>
<div id="jobSelect"></div>

<button onclick="selectAllJobs()">전체 선택</button>
<button onclick="clearJobs()">전체 해제</button>
</div>

<!-- 카드 -->
<div class="card">
  <img class="bg" id="bgImage" src="">

 <div class="content">
  <div id="job"></div> <!-- ⭐ 추가 -->

  <h1 id="name">캐릭터</h1>
  <div id="stats"></div>
  <div id="tags"></div>
</div>

<script>
  const jobCategories = {
  "전투": [
    "pld","war","drk","gnb",
    "whm","sch","ast","sge",
    "mnk","drg","nin","sam","rpr","vpr",
    "brd","mch","dnc",
    "blm","smn","rdm","blu","pct"
  ],
  "제작": [
    "crp","bsm","arm","gsm","ltw","wvr","alc","cul"
  ],
  "채집": [
    "min","btn","fsh"
  ]
};

    let selectedJobs = [];
  
function updateCard() { //  전체 업데이트 담당

  // 이름
  document.getElementById("name").innerText =
    document.getElementById("nameInput").value || "캐릭터";

  // 전투력
  let power = Number(document.getElementById("powerInput").value) || 0;
  let dots = "";

  for (let i = 0; i < 5; i++) {
    if (i < power) {
      dots += '<span class="dot filled"></span>';
    } else {
      dots += '<span class="dot"></span>';
    }
  }

  document.getElementById("stats").innerHTML = "전투: " + dots;

  // 태그
  let tags = document.getElementById("tagInput").value.split(",");
  let tagHTML = "";

  tags.forEach(tag => {
    if (tag.trim() !== "") {
      tagHTML += '<span class="tag">' + tag.trim() + '</span>';
    }
  });

  document.getElementById("tags").innerHTML = tagHTML;

  // 직업 아이콘
  let jobs = document.getElementById("jobInput").value
    .split(",")
    .map(j => j.trim().toLowerCase());

  let jobHTML = "";

selectedJobs.forEach(job => {
  let path = "images/jobs/ffxivjobssvg/" + job + ".svg";

  jobHTML += `<img src="${path}" style="width:40px; filter: invert(1);">`;
});

document.getElementById("job").innerHTML = jobHTML;
}

// ⭐⭐ 여기로 빼야 함 (핵심)
function loadImage(event) {
  let file = event.target.files[0];

  if (file) {
    let reader = new FileReader();

    reader.onload = function(e) {
      document.getElementById("bgImage").src = e.target.result;
    };

    reader.readAsDataURL(file);
  }
}

  function renderJobSelect() {
  let html = "";

  for (let category in jobCategories) {
    html += `<h4>${category}</h4>`;

    jobCategories[category].forEach(job => {
      let path = "images/jobs/ffxivjobssvg/" + job + ".svg";

      html += `
        <img src="${path}" 
             onclick="toggleJob('${job}')" 
             class="job-select"
             id="select-${job}">
      `;
    });
  }

  document.getElementById("jobSelect").innerHTML = html;
}

  function toggleJob(job) {
  if (selectedJobs.includes(job)) {
    selectedJobs = selectedJobs.filter(j => j !== job);
  } else {
    selectedJobs.push(job);
  }

  updateCard();
  updateSelectionUI();
}

  function updateSelectionUI() {
  document.querySelectorAll(".job-select").forEach(el => {
    let job = el.id.replace("select-", "");

    if (selectedJobs.includes(job)) {
      el.style.border = "2px solid white";
    } else {
      el.style.border = "none";
    }
  });
}

  function selectAllJobs() {
  selectedJobs = Object.values(jobCategories).flat();
  updateCard();
  updateSelectionUI();
}

function clearJobs() {
  selectedJobs = [];
  updateCard();
  updateSelectionUI();
}

  renderJobSelect();
</script>

</body>
</html>
