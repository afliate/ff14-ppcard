<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>캐릭터 시트 제작기</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
  body {
    margin: 0;
    background: #1a1a1a;
    color: white;
    font-family: sans-serif;
    display: flex;
  }

  .panel {
  width: 260px;   /* ⭐ % → 고정폭이 훨씬 안정적 */
  padding: 15px;
  background: #111;
}

  .card {
    position: relative;
    width: 70%;
    height: 100vh;
    overflow: hidden;
  }

  .bg {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.5);
  }

  .content {
    position: absolute;
    bottom: 50px;
    left: 50px;
  }

  h1 {
    font-size: 60px;
    margin: 0;
  }

  .dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 1px solid white;
    border-radius: 50%;
    margin-right: 5px;
  }

  .filled {
    background: white;
  }

  .tag {
    display: inline-block;
    border: 1px solid white;
    padding: 5px 10px;
    margin-right: 5px;
    margin-top: 5px;
  }

  input {
   width: 80%;
  max-width: 200px;
    margin-bottom: 10px;
    padding: 5px;
  }

  .job-select {
  width: 28px;
  height: 28px;
  cursor: pointer;
  filter: invert(1);
  transition: 0.15s;
  display: block;
  margin: auto;
}

.job-select:hover {
  transform: scale(1.1);
}

  #job {
  z-index: 10;
  position: absolute;
  left: 20px;
  bottom: 50px;

  display: flex;
  flex-direction: column; /* ⭐ 세로 */
  gap: 5px;
}
#mainTitle {
  position: absolute;
  top: 20px;
  left: 50px;
  font-size: 6vw;
  font-weight: bold;
}
.content {
  display: flex;
  gap: 20px;
}

.info {
  margin-left: 20px;
}
.info {
  background: rgba(0, 0, 0, 0.5);
  padding: 15px;
  border-radius: 10px;
  backdrop-filter: blur(5px); /* ⭐ 유리 느낌 */
}

  .content {
  position: absolute;
  bottom: 50px;
  left: 100px; /* 아이콘 자리 고려해서 밀기 */
}

  .feature-box {
  background: rgba(255, 0, 0, 0.7);
  padding: 5px 10px;
}
  /* 세로형 */
.card.vertical {
  width: 1080px;
  height: 1920px;
}

/* 가로형 */
.card.horizontal {
  width: 1920px;
  height: 1080px;
}
  .bg {
  object-fit: cover;
}
.horizontal .bg {
  object-position: center top;
}

  .preview-container {
  width: 80%;              /* 오른쪽 영역 */
  display: flex;
  justify-content: center;
}

  .preview-wrapper {
  transform: scale(0.7);
  transform-origin: top center;  /* ⭐ 변경 */
  display: flex;
  justify-content: center;       /* ⭐ 추가 */
}
  .save-box {
  margin-top: 20px;
  padding-top: 10px;
  border-top: 1px solid #444;
}
/* ⭐ 패널 섹션 정리 */
.panel h2 {
  margin-bottom: 10px;
}

.panel h3 {
  margin-top: 18px;
  margin-bottom: 6px;
  font-size: 14px;
  opacity: 0.7;
}

/* ⭐ 라벨 + 입력 묶음 */
.panel label {
  font-size: 12px;
  opacity: 0.8;
  margin-top: 6px;
}

/* ⭐ input 간격 + 숨통 */
.panel input,
.panel select {
  width: 100%;
  max-width: 220px;
  padding: 6px 8px;
  margin-bottom: 6px;
  box-sizing: border-box;
}

/* ⭐ 버튼 간격 */
.panel button {
  margin-top: 6px;
  padding: 6px;
  cursor: pointer;
}

/* ⭐ 직업 선택 영역 숨통 */
#jobSelect {
  margin-top: 6px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

/* ⭐ 구분선 느낌 */
.panel {
  border-right: 1px solid #222;
}

  .layout-buttons {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}

.layout-btn {
  flex: 1;
  padding: 6px;
  background: #222;
  color: white;
  border: 1px solid #444;
  cursor: pointer;
  font-size: 12px;
}

.layout-btn.active {
  background: white;
  color: black;
}
  .section {
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid #222;
}

.section h3 {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 8px;
}

.actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.actions button {
  padding: 6px;
  background: #222;
  border: 1px solid #444;
  color: white;
  cursor: pointer;
}
  .job-category {
  margin-bottom: 10px;
}

.job-title {
  font-size: 12px;
  opacity: 0.8;
  margin-bottom: 4px;
}

.job-subtitle {
  font-size: 11px;
  opacity: 0.6;
  margin: 4px 0;
}

.job-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 6px;
}
</style>
</head>

<body>

 <!-- 입력 패널 -->
<div class="panel">
  <h2>파이널 판타지 14 캐릭터 시트 제작기</h2>

  <!-- ⭐ 레이아웃 -->
  <div class="section">
    <label>레이아웃</label>
    <div class="layout-buttons">
      <button class="layout-btn active" onclick="setLayout('vertical')">세로형</button>
      <button class="layout-btn" onclick="setLayout('horizontal')">가로형</button>
    </div>
  </div>

  <!-- ⭐ 기본 정보 -->
  <div class="section">
    <h3>기본 정보</h3>

    <label>잡지 이름</label>
    <input id="titleInput" oninput="updateTitle()" placeholder="EORZEAN">

    <label>이름</label>
    <input id="nameInput" oninput="updateCard()" placeholder="캐릭터 이름">

    <label>전투력</label>
    <input id="powerInput" type="range" min="0" max="5" oninput="updateCard()">
  </div>

  <!-- ⭐ 이미지 -->
  <div class="section">
    <h3>이미지</h3>
    <input type="file" id="imgInput" accept="image/*" onchange="loadImage(event)">
  </div>

  <!-- ⭐ 직업 -->
  <div class="section">
    <h3>직업 선택</h3>
    <div id="jobSelect"></div>
  </div>

  <!-- ⭐ 태그 -->
  <div class="section">
    <h3>태그</h3>
    <input id="tagInput" oninput="updateCard()" placeholder="RT, BL, HL">
  </div>

  <!-- ⭐ 액션 -->
  <div class="section actions">
    <button onclick="selectAllJobs()">전체 선택</button>
    <button onclick="clearJobs()">전체 해제</button>
    <button onclick="saveImage()">이미지 저장</button>
  </div>

</div>

 <!-- 카드 -->
  
<div class="preview-container">
  <div class="preview-wrapper">
    <div class="card">
  <img class="bg" id="bgImage" src="">
  
 <h1 id="mainTitle">LALAFELL</h1>
  
<div class="content">
  <div id="job"></div>

<div class="info">
  <div class="feature-box">모험가</div>

  <h1 id="name">캐릭터</h1>
  <div id="stats"></div>
  <div id="tags"></div>
  </div>
</div>

<script>

// ⭐ 1. 직업 데이터
const jobCategories = {
  "전투": {
    "탱커": ["pld","war","drk","gnb"],
    "힐러": ["whm","sch","ast","sge"],
    "근딜": ["mnk","drg","nin","sam","rpr","vpr"],
    "원딜": ["brd","mch","dnc"],
    "마딜": ["blm","smn","rdm","pct","blu"]
  },
  "제작": [
    "crp","bsm","arm","gsm","ltw","wvr","alc","cul"
  ],
  "채집": [
    "min","btn","fsh"
  ]
};

// ⭐ 2. 선택된 직업 저장 (🔥 핵심)
let selectedJobs = [];


// ⭐ 3. 카드 업데이트
function updateCard() {

  // 이름
  document.getElementById("name").innerText =
    document.getElementById("nameInput").value || "캐릭터";

  // 전투력
  let power = Number(document.getElementById("powerInput").value) || 0;
  let dots = "";

  for (let i = 0; i < 5; i++) {
    dots += `<span class="dot ${i < power ? "filled" : ""}"></span>`;
  }

  document.getElementById("stats").innerHTML = "전투: " + dots;

  // 태그
  let tags = document.getElementById("tagInput").value.split(",");
  let tagHTML = "";

  tags.forEach(tag => {
    if (tag.trim() !== "") {
      tagHTML += `<span class="tag">${tag.trim()}</span>`;
    }
  });

  document.getElementById("tags").innerHTML = tagHTML;

  // ⭐ 직업 표시
  let jobHTML = [];

  Object.values(jobCategories).forEach(category => {

    // 전투 (2단 구조)
    if (typeof category === "object" && !Array.isArray(category)) {
      Object.values(category).forEach(sub => {
        sub.forEach(job => {
          if (selectedJobs.includes(job)) {
            let path = "images/jobs/ffxivjobssvg/" + job + ".svg";
            jobHTML.push(`<img src="${path}" style="width:30px; filter: invert(1);">`);
          }
        });
      });
    }

    // 제작 / 채집
    else {
      category.forEach(job => {
        if (selectedJobs.includes(job)) {
          let path = "images/jobs/ffxivjobssvg/" + job + ".svg";
          jobHTML.push(`<img src="${path}" style="width:30px; filter: invert(1);">`);
        }
      });
    }

  });

  document.getElementById("job").innerHTML = jobHTML.join("");
}


// ⭐ 클릭하면 선택/해제
function toggleJob(job) {
  if (selectedJobs.includes(job)) {
    selectedJobs = selectedJobs.filter(j => j !== job);
  } else {
    selectedJobs.push(job);
  }

  updateCard();
  updateSelectionUI();
}


// ⭐ 선택 UI 생성
function renderJobSelect() {
  let html = "";

  for (let category in jobCategories) {

    html += `<div class="job-category">`;
    html += `<div class="job-title">${category}</div>`;

    let data = jobCategories[category];

    if (typeof data === "object" && !Array.isArray(data)) {

      for (let sub in data) {
        html += `<div class="job-subtitle">${sub}</div>`;
        html += `<div class="job-row">`;

        data[sub].forEach(job => {
          let path = "images/jobs/ffxivjobssvg/" + job + ".svg";

          html += `
            <img src="${path}"
                 onclick="toggleJob('${job}')"
                 class="job-select"
                 id="select-${job}">
          `;
        });

        html += `</div>`;
      }

    } else {
      html += `<div class="job-row">`;

      data.forEach(job => {
        let path = "images/jobs/ffxivjobssvg/" + job + ".svg";

        html += `
          <img src="${path}"
               onclick="toggleJob('${job}')"
               class="job-select"
               id="select-${job}">
        `;
      });

      html += `</div>`;
    }

    html += `</div>`;
  }

  document.getElementById("jobSelect").innerHTML = html;
}

// ⭐ 선택된 UI 표시
function updateSelectionUI() {
  document.querySelectorAll(".job-select").forEach(el => {
    let job = el.id.replace("select-", "");

    if (selectedJobs.includes(job)) {
      el.style.border = "2px solid white";
    } else {
      el.style.border = "none";
    }
  });
}


// ⭐ 전체 선택
function selectAllJobs() {
  selectedJobs = [];

  Object.values(jobCategories).forEach(category => {
    if (typeof category === "object" && !Array.isArray(category)) {
      Object.values(category).forEach(sub => {
        selectedJobs.push(...sub);
      });
    } else {
      selectedJobs.push(...category);
    }
  });

  updateCard();
  updateSelectionUI();
}


// ⭐ 전체 해제
function clearJobs() {
  selectedJobs = [];
  updateCard();
  updateSelectionUI();
}


// ⭐ 이미지 업로드
function loadImage(event) {
  let file = event.target.files[0];

  if (file) {
    let reader = new FileReader();

    reader.onload = function(e) {
      document.getElementById("bgImage").src = e.target.result;
    };

    reader.readAsDataURL(file);
  }
}


// ⭐ 이미지 저장
function saveImage() {
  html2canvas(document.querySelector(".card"), {
    scale: 2
  }).then(canvas => {
    let link = document.createElement("a");
    link.download = "character.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}


// ⭐ 제목
function updateTitle() {
  document.getElementById("mainTitle").innerText =
    document.getElementById("titleInput").value || "TITLE";
}


// ⭐ 레이아웃 변경
function setLayout(mode) {
  let card = document.querySelector(".card");

  card.classList.remove("vertical", "horizontal");
  card.classList.add(mode);

  document.querySelectorAll(".layout-btn").forEach(btn => {
    btn.classList.remove("active");
  });

  event.target.classList.add("active");
}


// ⭐ 초기 실행
renderJobSelect();
document.querySelector(".card").classList.add("vertical");

</script>

</body>
</html>
