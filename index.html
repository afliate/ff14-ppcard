<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>캐릭터 시트 제작기</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  margin: 0;
  background: #1a1a1a;
  color: white;
  font-family: sans-serif;
  display: flex;
}

.panel {
  width: 260px;
  padding: 15px;
  background: #111;
  border-right: 1px solid #222;
}

.card {
  position: relative;
  width: 70%;
  height: 100vh;
  overflow: hidden;
}

/* 배경 */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.55);
}

/* ===== 잡지 오버레이 ===== */
.overlay {
  position: absolute;
  inset: 0;
  padding: 40px;
  display: grid;
  grid-template-rows: auto auto auto 1fr auto;
  gap: 18px;
}

/* 헤더 */
.mag-header {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  opacity: 0.8;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  padding-bottom: 10px;
}

/* 타이틀 */
.mag-title {
  font-size: 48px;
  font-weight: bold;
  letter-spacing: 2px;
}

.new-badge {
  background: crimson;
  padding: 2px 8px;
  font-size: 11px;
  border-radius: 4px;
  margin-left: 10px;
}

/* 프로필 */
.profile {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#name {
  font-size: 32px;
  margin: 0;
}

#stats {
  font-size: 12px;
  opacity: 0.8;
}

/* 본문 2컬럼 */
.body-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.block {
  background: rgba(0,0,0,0.35);
  padding: 12px;
  border-radius: 10px;
  backdrop-filter: blur(6px);
}

.block h3 {
  font-size: 12px;
  opacity: 0.7;
  margin-bottom: 8px;
}

/* 태그 */
.tag {
  display: inline-block;
  border: 1px solid white;
  padding: 4px 8px;
  margin: 3px;
  font-size: 11px;
}

/* 직업 아이콘 */
#job {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

#job img {
  width: 28px;
  filter: invert(1);
}

/* 푸터 */
.footer {
  font-size: 10px;
  opacity: 0.6;
  text-align: center;
  border-top: 1px solid rgba(255,255,255,0.2);
  padding-top: 8px;
}

/* 전투력 도트 */
.dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border: 1px solid white;
  border-radius: 50%;
  margin-right: 3px;
}

.filled { background: white; }

/* 레이아웃 */
.card.vertical { width: 1080px; height: 1920px; }
.card.horizontal { width: 1920px; height: 1080px; }

/* 패널 */
input {
  width: 100%;
  padding: 6px;
  margin-bottom: 8px;
  box-sizing: border-box;
}

button { cursor: pointer; }

</style>
</head>

<body>

<!-- PANEL -->
<div class="panel">
  <h2>캐릭터 시트 제작기</h2>

  <input id="titleInput" oninput="updateTitle()" placeholder="잡지 이름">
  <input id="nameInput" oninput="updateCard()" placeholder="이름">
  <input id="powerInput" type="range" min="0" max="5" oninput="updateCard()">
  <input id="tagInput" oninput="updateCard()" placeholder="태그">

  <input type="file" onchange="loadImage(event)">

  <button onclick="selectAllJobs()">전체 선택</button>
  <button onclick="clearJobs()">전체 해제</button>
  <button onclick="saveImage()">저장</button>
</div>

<!-- CARD -->
<div class="card vertical">
  <img class="bg" id="bgImage">

  <div class="overlay">

    <!-- HEADER -->
    <div class="mag-header">
      <div>Daily Eorzea</div>
      <div>No.1 / SPECIAL</div>
    </div>

    <!-- TITLE -->
    <div>
      <span class="mag-title" id="mainTitle">EORZEAN</span>
      <span class="new-badge">NEW</span>
    </div>

    <!-- PROFILE -->
    <div class="profile">
      <div>
        <h2 id="name">캐릭터</h2>
        <div id="stats"></div>
      </div>
    </div>

    <!-- BODY -->
    <div class="body-grid">

      <div class="block">
        <h3>MAIN JOB</h3>
        <div id="job"></div>
      </div>

      <div class="block">
        <h3>PLAY STYLE</h3>
        <div id="tags"></div>
      </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
      FINAL FANTASY XIV © SQUARE ENIX / Fan-made Sheet
    </div>

  </div>
</div>

<script>

const jobCategories = {
  "전투": {
    "탱커": ["pld","war","drk","gnb"],
    "힐러": ["whm","sch","ast","sge"],
    "근딜": ["mnk","drg","nin","sam","rpr","vpr"],
    "원딜": ["brd","mch","dnc"],
    "마딜": ["blm","smn","rdm","pct","blu"]
  },
  "제작": ["crp","bsm","arm","gsm","ltw","wvr","alc","cul"],
  "채집": ["min","btn","fsh"]
};

let selectedJobs = [];

function updateCard() {

  document.getElementById("name").innerText =
    document.getElementById("nameInput").value || "캐릭터";

  let power = Number(document.getElementById("powerInput").value);
  let dots = "";

  for (let i=0;i<5;i++) {
    dots += `<span class='dot ${i<power?'filled':''}'></span>`;
  }

  document.getElementById("stats").innerHTML = dots;

  let tags = document.getElementById("tagInput").value.split(",");
  document.getElementById("tags").innerHTML = tags.map(t => t.trim() ? `<span class='tag'>${t}</span>` : "").join("");

  let html = "";

  Object.values(jobCategories).forEach(cat => {
    if (!Array.isArray(cat)) {
      Object.values(cat).forEach(sub => {
        sub.forEach(j => {
          if (selectedJobs.includes(j)) {
            html += `<img src='images/jobs/ffxivjobssvg/${j}.svg'>`;
          }
        });
      });
    } else {
      cat.forEach(j => {
        if (selectedJobs.includes(j)) {
          html += `<img src='images/jobs/ffxivjobssvg/${j}.svg'>`;
        }
      });
    }
  });

  document.getElementById("job").innerHTML = html;
}

function toggleJob(job){
  if(selectedJobs.includes(job)){
    selectedJobs = selectedJobs.filter(j=>j!==job);
  } else {
    selectedJobs.push(job);
  }
  updateCard();
}

function selectAllJobs(){
  selectedJobs=[];
  Object.values(jobCategories).forEach(cat=>{
    if(!Array.isArray(cat)){
      Object.values(cat).forEach(sub=>selectedJobs.push(...sub));
    } else selectedJobs.push(...cat);
  });
  updateCard();
}

function clearJobs(){ selectedJobs=[]; updateCard(); }

function loadImage(e){
  let r=new FileReader();
  r.onload=e=>document.getElementById("bgImage").src=e.target.result;
  r.readAsDataURL(e.target.files[0]);
}

function saveImage(){
  html2canvas(document.querySelector(".card"),{scale:2}).then(c=>{
    let a=document.createElement("a");
    a.download="character.png";
    a.href=c.toDataURL();
    a.click();
  });
}

function updateTitle(){
  document.getElementById("mainTitle").innerText=
    document.getElementById("titleInput").value||"EORZEAN";
}

</script>

</body>
</html>
