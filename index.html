<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>FF14 캐릭터 시트 제작기</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #1a1a1a;
  color: white;
  font-family: sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ==========================================
   왼쪽 패널
========================================== */
.panel {
  width: 260px;
  min-width: 260px;
  padding: 15px;
  background: #111;
  border-right: 1px solid #222;
  overflow-y: auto;
  height: 100vh;
}

.panel h2 {
  font-size: 13px;
  margin: 0 0 14px 0;
  line-height: 1.4;
  opacity: 0.9;
}

.section {
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid #222;
}

.section h3 {
  font-size: 11px;
  opacity: 0.5;
  margin: 0 0 8px 0;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 8px;
}

.field label {
  font-size: 11px;
  opacity: 0.6;
}

.field input[type="text"] {
  width: 100%;
  padding: 5px 7px;
  background: #222;
  border: 1px solid #333;
  color: white;
  font-size: 12px;
}

.layout-buttons {
  display: flex;
  gap: 6px;
}

.layout-btn {
  flex: 1;
  padding: 6px;
  background: #222;
  color: white;
  border: 1px solid #444;
  cursor: pointer;
  font-size: 12px;
}

.layout-btn.active {
  background: white;
  color: black;
}

input[type="file"] {
  font-size: 11px;
  color: #aaa;
  width: 100%;
}

/* 직업 선택 */
.job-category { margin-bottom: 10px; }
.job-title { font-size: 11px; opacity: 0.5; margin-bottom: 6px; }
.job-subrow { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.job-subtitle { width: 36px; font-size: 10px; opacity: 0.5; flex-shrink: 0; }
.job-row { display: flex; flex-wrap: wrap; gap: 4px; }

.job-icon {
  width: 26px;
  height: 26px;
  cursor: pointer;
  filter: invert(1);
  opacity: 0.4;
  transition: opacity 0.1s;
}
.job-icon:hover { opacity: 0.8; outline: 1px solid rgba(255,255,255,0.5); outline-offset: 2px; }
.job-icon.selected { opacity: 1; outline: 2px solid white; outline-offset: 2px; }
.job-icon.main-selected { opacity: 1; outline: 2px solid #f5c518; outline-offset: 2px; }

/* 직업 섹션 헤더 */
.job-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  padding: 4px 0;
  user-select: none;
}
.job-section-header span { font-size: 11px; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.05em; }
.job-section-header .toggle-arrow { font-size: 10px; opacity: 0.4; }
.job-section-body { overflow: hidden; }
.job-section-body.collapsed { display: none; }

.section button {
  padding: 7px;
  background: #222;
  border: 1px solid #444;
  color: white;
  cursor: pointer;
  font-size: 12px;
  flex: 1;
}
.section button:hover { background: #333; }

.actions { display: flex; flex-direction: column; gap: 6px; }
.actions button {
  padding: 7px;
  background: #222;
  border: 1px solid #444;
  color: white;
  cursor: pointer;
  font-size: 12px;
}

  /* 메인잡 아이콘 스타일 */
.job-icon.main-selected {
  opacity: 1;
  outline: 3px solid #f5c518; /* 노란색 포인트 테두리 */
  outline-offset: 2px;
  transform: none; /* 크기 커지는 효과 제거 */
}
.actions button:hover { background: #333; }

/* ==========================================
   오른쪽 미리보기
========================================== */
.preview-container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overflow: hidden;
  padding: 20px;
}

.preview-wrapper {
  transform-origin: top center;
}

/* ==========================================
   카드 본체
========================================== */
.card {
  position: relative;
  overflow: hidden;
  background: #1a0a2e;
  font-family: 'Arial Black', Arial, sans-serif;
}

.card.vertical  { width: 1080px; height: 1920px; }
.card.horizontal { width: 1920px; height: 1080px; }

/* 배경 이미지 */
.card .bg {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  filter: brightness(0.55);
}

/* ── 상단 바 ── */
.top-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 110px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 60px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(4px);
  z-index: 10;
}

#mainTitle {
  font-size: 80px;
  font-weight: 900;
  letter-spacing: -2px;
  line-height: 1;
  color: white;
}

.barcode-wrap {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.barcode-svg {
  width: 120px;
  height: 50px;
}

.barcode-text {
  font-size: 16px;
  opacity: 0.5;
  letter-spacing: 0.05em;
}

/* 하단 블록을 그라데이션으로 교체 */
.bottom-block {
  background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
  /* ... 나머지 속성 ... */
}

/* 직업 아이콘 세로 나열 */
#jobDisplay {
  display: flex;
  flex-direction: column; /* 세로로! */
  position: absolute;
  left: 40px;
  bottom: 150px;
  gap: 10px;
}

/* 칭호 + 이름 + 서버 */
.name-section {
  margin-bottom: 24px;
}

.feature-box {
  display: inline-block;
  background: rgba(200,20,20,0.9);
  padding: 5px 14px;
  font-size: 18px;
  font-weight: bold;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}

#cardName {
  font-size: 72px;
  font-weight: 900;
  margin: 0 0 6px 0;
  letter-spacing: -1px;
  line-height: 1;
  color: white;
}

#serverInfo {
  font-size: 22px;
  opacity: 0.6;
  letter-spacing: 0.05em;
}

/* 직업 + 오른쪽 정보 가로 배치 */
.mid-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 40px;
  margin-bottom: 24px;
}

/* 직업 아이콘 영역 */
#jobDisplay {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  max-width: 600px;
}

#jobDisplay img {
  width: 56px;
  height: 56px;
  filter: invert(1);
}

/* 오른쪽 정보 */
.right-section {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 14px;
  min-width: 300px;
}

/* 태그 */
#cardTags { text-align: right; }
.tag {
  display: inline-block;
  border: 1px solid rgba(255,255,255,0.7);
  padding: 4px 12px;
  margin: 3px;
  font-size: 16px;
  letter-spacing: 0.05em;
}

/* 활동 시간 */
.active-time {
  display: flex;
  gap: 8px;
}
.time-slot {
  padding: 4px 12px;
  border: 1px solid rgba(255,255,255,0.3);
  font-size: 15px;
  opacity: 0.5;
  letter-spacing: 0.03em;
}
.time-slot.active {
  border-color: white;
  opacity: 1;
  background: rgba(255,255,255,0.1);
}

/* 메모 */
#cardMemo {
  font-size: 18px;
  opacity: 0.55;
  margin-bottom: 20px;
  letter-spacing: 0.02em;
  font-style: italic;
  font-family: serif;
}

/* 푸터: 저작권 + 라인아트 */
.bottom-footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  position: relative;
}

.copyright {
  font-size: 14px;
  opacity: 0.35;
  line-height: 1.8;
  letter-spacing: 0.03em;
}

/* 라인아트 */
#lineArt {
  position: absolute;
  right: -20px;
  bottom: -20px;
  width: 320px;
  opacity: 0.18;
  mix-blend-mode: screen;
  pointer-events: none;
  filter: brightness(0) invert(1); /* 검은색을 흰색으로 강제 전환 */
}

  /* 선택된 아이콘 스타일 */
.lineart-icon.selected {
  border: 2px solid #f5c518 !important; /* 지은이가 좋아하는 노란색 포인트! */
  background: #333;
}

</style>
</head>

<body>

<!-- 왼쪽 패널 -->
<div class="panel">
  <h2>FF14 캐릭터 시트 제작기</h2>

  <!-- 레이아웃 -->
  <div class="section">
    <h3>레이아웃</h3>
    <div class="layout-buttons">
      <button class="layout-btn active" onclick="setLayout('vertical', this)">세로형</button>
      <button class="layout-btn" onclick="setLayout('horizontal', this)">가로형</button>
    </div>
  </div>

  <!-- 기본 정보 -->
  <div class="section">
    <h3>기본 정보</h3>
    <div class="field">
      <label>잡지 이름</label>
      <input type="text" id="titleInput" oninput="updateCard()" placeholder="EORZEAN">
    </div>
    <div class="field">
      <label>칭호</label>
      <input type="text" id="titleBoxInput" oninput="updateCard()" placeholder="파티의 소금">
    </div>
    <div class="field">
      <label>닉네임</label>
      <input type="text" id="nameInput" oninput="updateCard()" placeholder="닉네임">
    </div>
    <div class="field">
      <label>서버</label>
      <input type="text" id="serverInput" oninput="updateCard()" placeholder="">
    </div>
    <div class="field">
      <label>데이터센터</label>
      <input type="text" id="dcInput" oninput="updateCard()" placeholder="">
    </div>
  </div>

  <!-- 배경 이미지 -->
  <div class="section">
    <h3>배경 이미지</h3>
    <input type="file" accept="image/*" onchange="loadBgImage(event)">
  </div>

  <!-- 라인아트 이미지 -->
<div class="section">
  <h3>라인아트 선택 (21종)</h3>
  <div id="lineArtPicker" style="display: flex; flex-wrap: wrap; gap: 5px; max-height: 150px; overflow-y: auto; padding: 5px; background: #111;">
    </div>
</div>

  <!-- 직업 선택 -->
  <div class="section">
    <div class="job-section-header" onclick="toggleJobSection()">
      <span>직업 선택</span>
      <span class="toggle-arrow" id="jobArrow">▼</span>
    </div>
    <div class="job-section-body" id="jobSectionBody">
      <div style="display:flex; gap:6px; margin-bottom:8px; margin-top:6px;">
        <button onclick="selectAllJobs()" style="flex:1;">전체 선택</button>
        <button onclick="clearJobs()" style="flex:1;">전체 해제</button>
      </div>
      <div style="font-size:10px; opacity:0.45; margin-bottom:8px;">※ 노란 테두리 = 메인잡 (클릭 유지 → 다시 클릭으로 메인 지정)</div>
      <div id="jobSelect"></div>
    </div>
  </div>

  <!-- 태그 -->
  <div class="section">
    <h3>태그</h3>
    <div class="field">
      <label>쉼표로 구분</label>
      <input type="text" id="tagInput" oninput="updateCard()" placeholder="RT, BL, HL">
    </div>
  </div>

  <!-- 활동 시간 -->
  <div class="section">
    <h3>활동 시간</h3>
    <div style="display:flex; gap:6px; flex-wrap:wrap;">
      <button class="time-btn" data-time="아침" onclick="toggleTime(this)">아침</button>
      <button class="time-btn" data-time="점심" onclick="toggleTime(this)">점심</button>
      <button class="time-btn" data-time="저녁" onclick="toggleTime(this)">저녁</button>
      <button class="time-btn" data-time="심야" onclick="toggleTime(this)">심야</button>
    </div>
  </div>

  <!-- 메모 -->
  <div class="section">
    <h3>메모 / 코멘트</h3>
    <div class="field">
      <input type="text" id="memoInput" oninput="updateCard()" placeholder="한 줄 코멘트">
    </div>
  </div>

  <!-- 저장 -->
  <div class="section actions">
    <button onclick="saveImage()">이미지 저장</button>
  </div>
</div>


<!-- 오른쪽 미리보기 -->
<div class="preview-container">
  <div class="preview-wrapper" id="previewWrapper">

    <div class="card vertical" id="card">
      <!-- 배경 -->
      <img class="bg" id="bgImage" src="">

      <!-- 상단 바 -->
      <div class="top-bar">
        <div id="mainTitle">EORZEAN</div>
        <div class="barcode-wrap">
          <svg class="barcode-svg" id="barcodeSvg" viewBox="0 0 120 50"></svg>
          <div class="barcode-text" id="barcodeText">FF14-PROFILE</div>
        </div>
      </div>

      <!-- 하단 정보 블록 -->
      <div class="bottom-block">

        <!-- 칭호 + 이름 + 서버 -->
        <div class="name-section">
          <div class="feature-box" id="featureBox">모험가</div>
          <div id="cardName">캐릭터</div>
          <div id="serverInfo">Carbuncle · Elemental</div>
        </div>

        <!-- 직업 + 오른쪽 -->
        <div class="mid-row">
          <div id="jobDisplay"></div>
          <div class="right-section">
            <div id="cardTags"></div>
            <div class="active-time" id="activeTimeDisplay"></div>
          </div>
        </div>

        <!-- 메모 -->
        <div id="cardMemo"></div>

        <!-- 푸터 -->
        <div class="bottom-footer">
          <div class="copyright">
            ⓒ SQUARE ENIX<br>
            Published in Korea by ACTOZ SOFT CO., LTD<br>
            FINAL FANTASY XIV
          </div>
          <img id="lineArt" src="" style="display:none;">
        </div>

      </div>
    </div>

  </div>
</div>


<script>
const jobCategories = {
  "전투": {
    "탱커": ["pld","war","drk","gnb"],
    "힐러": ["whm","sch","ast","sge"],
    "근딜": ["mnk","drg","nin","sam","rpr","vpr"],
    "원딜": ["brd","mch","dnc"],
    "마딜": ["blm","smn","rdm","pct","blu"]
  },
  "제작": ["crp","bsm","arm","gsm","ltw","wvr","alc","cul"],
  "채집": ["min","btn","fsh"]
};

let selectedJobs = [];
let mainJob = null;
let activeTimes = [];

/* ── 카드 업데이트 ── */
function updateCard() {
  document.getElementById("mainTitle").innerText =
    document.getElementById("titleInput").value || "EORZEAN";

  document.getElementById("featureBox").innerText =
    document.getElementById("titleBoxInput").value || "모험가";

  document.getElementById("cardName").innerText =
    document.getElementById("nameInput").value || "캐릭터";

  const server = document.getElementById("serverInput").value || "Carbuncle";
  const dc = document.getElementById("dcInput").value;
// 데이터센터가 비어있으면 서버 이름만 나오게 처리
document.getElementById("serverInfo").innerText = dc ? `${server} · ${dc}` : server;

  // 바코드 텍스트
  const nameVal = document.getElementById("nameInput").value || "FF14";
  document.getElementById("barcodeText").innerText = nameVal.toUpperCase().slice(0, 12);
  drawBarcode();

  // 직업 아이콘
  const allJobs = getAllJobsInOrder();
  document.getElementById("jobDisplay").innerHTML = allJobs
    .filter(job => selectedJobs.includes(job))
    .map(job => {
      const isMain = job === mainJob;
      const style = isMain
        ? "width:72px;height:72px;filter:invert(1);outline:3px solid #f5c518;outline-offset:3px;"
        : "width:56px;height:56px;filter:invert(1);";
      return `<img src="images/jobs/ffxivjobssvg_meteor/${job}.svg" style="${style}">`;
    }).join("");

  // 태그
  const tags = document.getElementById("tagInput").value.split(",");
  document.getElementById("cardTags").innerHTML = tags
    .map(t => t.trim()).filter(t => t)
    .map(t => `<span class="tag">${t}</span>`).join("");

  // 활동 시간
  const timeLabels = ["아침","점심","저녁","심야"];
  document.getElementById("activeTimeDisplay").innerHTML = timeLabels
    .map(t => `<div class="time-slot ${activeTimes.includes(t) ? 'active' : ''}">${t}</div>`)
    .join("");

  // 메모
  const memo = document.getElementById("memoInput").value;
  document.getElementById("cardMemo").innerText = memo || "";
}

/* ── 바코드 SVG 생성 ── */
function drawBarcode() {
  const svg = document.getElementById("barcodeSvg");
  const bars = 40;
  const w = 120, h = 50;
  let html = "";
  for (let i = 0; i < bars; i++) {
    const x = (i / bars) * w;
    const bw = (Math.random() < 0.4 ? 2 : 1);
    const bh = Math.random() < 0.2 ? h * 0.7 : h * 0.85;
    html += `<rect x="${x}" y="${h - bh}" width="${bw}" height="${bh}" fill="white" opacity="0.7"/>`;
  }
  svg.innerHTML = html;
}

/* ── 직업 선택 UI ── */
function renderJobSelect() {
  let html = "";
  for (const category in jobCategories) {
    const data = jobCategories[category];
    html += `<div class="job-category"><div class="job-title">${category}</div>`;
    if (typeof data === "object" && !Array.isArray(data)) {
      for (const sub in data) {
        html += `<div class="job-subrow"><div class="job-subtitle">${sub}</div><div class="job-row">`;
        data[sub].forEach(job => {
          html += `<img src="images/jobs/ffxivjobssvg/${job}.svg" class="job-icon" id="icon-${job}" onclick="toggleJob('${job}')" title="${job}">`;
        });
        html += `</div></div>`;
      }
    } else {
      html += `<div class="job-row">`;
      data.forEach(job => {
        html += `<img src="images/jobs/ffxivjobssvg/${job}.svg" class="job-icon" id="icon-${job}" onclick="toggleJob('${job}')" title="${job}">`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }
  document.getElementById("jobSelect").innerHTML = html;
}

function toggleJob(job) {
  if (!selectedJobs.includes(job)) {
    selectedJobs.push(job);
  } else if (mainJob !== job) {
    mainJob = job;
  } else {
    selectedJobs = selectedJobs.filter(j => j !== job);
    if (mainJob === job) mainJob = null;
  }
  updateSelectionUI();
  updateCard();
}

function updateSelectionUI() {
  document.querySelectorAll(".job-icon").forEach(el => {
    const job = el.id.replace("icon-", "");
    el.classList.remove("selected", "main-selected");
    if (job === mainJob)           el.classList.add("main-selected");
    else if (selectedJobs.includes(job)) el.classList.add("selected");
  });
}

function selectAllJobs() {
  selectedJobs = getAllJobsInOrder();
  updateSelectionUI(); updateCard();
}
function clearJobs() {
  selectedJobs = []; mainJob = null;
  updateSelectionUI(); updateCard();
}
function getAllJobsInOrder() {
  const all = [];
  Object.values(jobCategories).forEach(cat => {
    if (Array.isArray(cat)) all.push(...cat);
    else Object.values(cat).forEach(sub => all.push(...sub));
  });
  return all;
}

/* ── 직업 섹션 접기/펼치기 ── */
function toggleJobSection() {
  const body  = document.getElementById("jobSectionBody");
  const arrow = document.getElementById("jobArrow");
  const collapsed = body.classList.toggle("collapsed");
  arrow.innerText = collapsed ? "▶" : "▼";
}

/* ── 활동 시간 ── */
function toggleTime(btn) {
  const t = btn.dataset.time;
  if (activeTimes.includes(t)) {
    activeTimes = activeTimes.filter(x => x !== t);
    btn.style.background = "";
    btn.style.color = "";
  } else {
    activeTimes.push(t);
    btn.style.background = "white";
    btn.style.color = "black";
  }
  updateCard();
}

/* ── 이미지 로드 ── */
let bgPosX = 50, bgPosY = 50;
let isDragging = false, dragStartX, dragStartY;

function loadBgImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const bg = document.getElementById("bgImage");
    bg.src = e.target.result;
    bg.style.cursor = "grab";
    bg.addEventListener("mousedown", startDrag);
  };
  reader.readAsDataURL(file);
}

function loadLineArt(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const la = document.getElementById("lineArt");
    la.src = e.target.result;
    la.style.display = "block";
  };
  reader.readAsDataURL(file);
}

function startDrag(e) {
  isDragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  document.getElementById("bgImage").style.cursor = "grabbing";
  document.addEventListener("mousemove", onDrag);
  document.addEventListener("mouseup", stopDrag);
}
function onDrag(e) {
  if (!isDragging) return;
  const card = document.getElementById("card");
  bgPosX = Math.min(100, Math.max(0, bgPosX - (e.clientX - dragStartX) / card.offsetWidth * 100));
  bgPosY = Math.min(100, Math.max(0, bgPosY - (e.clientY - dragStartY) / card.offsetHeight * 100));
  document.getElementById("bgImage").style.objectPosition = `${bgPosX}% ${bgPosY}%`;
  dragStartX = e.clientX; dragStartY = e.clientY;
}
function stopDrag() {
  isDragging = false;
  document.getElementById("bgImage").style.cursor = "grab";
  document.removeEventListener("mousemove", onDrag);
  document.removeEventListener("mouseup", stopDrag);
}

/* ── 레이아웃 ── */
function setLayout(mode, btn) {
  const card = document.getElementById("card");
  card.classList.remove("vertical", "horizontal");
  card.classList.add(mode);
  document.querySelectorAll(".layout-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  fitPreview();
}

/* ── 미리보기 스케일 ── */
function fitPreview() {
  const card = document.getElementById("card");
  const container = document.querySelector(".preview-container");
  const wrapper = document.getElementById("previewWrapper");
  const cw = container.clientWidth - 40;
  const ch = container.clientHeight - 40;
  const cardW = card.classList.contains("vertical") ? 1080 : 1920;
  const cardH = card.classList.contains("vertical") ? 1920 : 1080;
  const scale = Math.min(cw / cardW, ch / cardH);
  wrapper.style.transform = `scale(${scale})`;
  wrapper.style.width  = cardW + "px";
  wrapper.style.height = cardH + "px";
}

/* ── 저장 ── */
function saveImage() {
  html2canvas(document.getElementById("card"), { scale: 2 }).then(canvas => {
    const link = document.createElement("a");
    link.download = "character_sheet.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
