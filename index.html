<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>캐릭터 시트 제작기</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#111;
  color:#fff;
  display:flex;
  height:100vh;
}

/* LEFT PANEL */
.panel{
  width:320px;
  padding:16px;
  background:#1c1c1c;
  overflow:auto;
}
.panel h2{margin-top:0;}
.panel label{display:block; margin-top:12px; font-size:14px;}
.panel input, .panel select, .panel textarea{
  width:100%; padding:6px; margin-top:4px;
}

button{
  margin-top:12px;
  width:100%; padding:10px;
  cursor:pointer;
}

/* RIGHT PREVIEW */
.preview{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#222;
}

.card{
  width:600px;
  height:800px;
  position:relative;
  background:url('https://images.unsplash.com/photo-1520975922284-9d3b0d7d2b5c') center/cover;
  overflow:hidden;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.header{
  font-size:14px;
  opacity:0.8;
}

.title{
  font-size:28px;
  font-weight:bold;
}

.section{
  margin-top:10px;
  padding:10px;
  border:1px solid rgba(255,255,255,0.2);
}

.jobs{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.job{
  padding:4px 8px;
  border:1px solid #fff;
  font-size:12px;
}

.bottom{
  margin-top:auto;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>
<body>

<div class="panel">
  <h2>입력 패널</h2>

  <label>잡지 이름</label>
  <input id="magazine" />

  <label>캐릭터 이름</label>
  <input id="name" />

  <label>전투력</label>
  <input id="power" type="number" />

  <label>잡 선택 (다중 가능)</label>
  <select id="job" multiple>
    <option>전사</option>
    <option>마법사</option>
    <option>힐러</option>
    <option>탱커</option>
  </select>

  <label>태그 (쉼표)</label>
  <input id="tags" />

  <label>이미지 업로드</label>
  <input type="file" id="img" />

  <button onclick="renderCard()">적용</button>
  <button onclick="saveCard()">이미지 저장</button>
</div>

<div class="preview">
  <div class="card" id="card">
    <div class="overlay">
      <div class="header" id="magazineOut">DAILY EORZEA</div>
      <div class="title" id="nameOut">CHARACTER NAME</div>

      <div class="section">
        <strong>JOBS</strong>
        <div class="jobs" id="jobOut"></div>
      </div>

      <div class="section">
        <strong>POWER</strong>
        <div id="powerOut"></div>
      </div>

      <div class="section">
        <strong>TAGS</strong>
        <div id="tagsOut"></div>
      </div>

      <div class="bottom">FFXIV CHARACTER SHEET</div>
    </div>
  </div>
</div>

<script>
let imgUrl = "";

document.getElementById('img').addEventListener('change', function(e){
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(evt){
    imgUrl = evt.target.result;
    document.getElementById('card').style.backgroundImage = `url(${imgUrl})`;
  };
  reader.readAsDataURL(file);
});

function renderCard(){
  document.getElementById('magazineOut').innerText = document.getElementById('magazine').value || 'DAILY EORZEA';
  document.getElementById('nameOut').innerText = document.getElementById('name').value || 'CHARACTER NAME';
  document.getElementById('powerOut').innerText = document.getElementById('power').value || '0';

  const tags = document.getElementById('tags').value.split(',');
  document.getElementById('tagsOut').innerHTML = tags.map(t => `<span class='job'>${t.trim()}</span>`).join('');

  const jobs = Array.from(document.getElementById('job').selectedOptions).map(o => o.value);
  document.getElementById('jobOut').innerHTML = jobs.map(j => `<span class='job'>${j}</span>`).join('');
}

function saveCard(){
  html2canvas(document.getElementById('card')).then(canvas => {
    const link = document.createElement('a');
    link.download = 'character.png';
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
